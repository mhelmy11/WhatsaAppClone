<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone - Mock Frontend</title>
    <style>
        /* نفس الأنماط السابقة بدون تغيير */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e5ded8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 1400px;
            max-width: 95%;
            height: 800px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 30%;
            background: #f0f2f5;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 15px;
            background: #075e54;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header select {
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .conversation-item {
            display: flex;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            background: white;
            transition: background 0.2s;
            align-items: center;
        }
        .conversation-item:hover {
            background: #e9edf0;
        }
        .conversation-item.active {
            background: #d9fdd3;
        }
        .conversation-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #128C7E;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: 10px;
        }
        .conversation-info {
            flex: 1;
        }
        .conversation-name {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .conversation-last-message {
            font-size: 0.9em;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-badge {
            background: #25d366;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .main {
            width: 70%;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            background: #f0f2f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #128C7E;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
        }
        .chat-header .info h3 {
            font-size: 1.1em;
        }
        .chat-header .info p {
            font-size: 0.9em;
            color: #555;
        }
        .messages-area {
            flex: 1;
            background: #efeae2;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 60%;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 7px;
            position: relative;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background: #d9fdd3;
        }
        .message.received {
            align-self: flex-start;
            background: white;
        }
        .message .sender-name {
            font-size: 0.8em;
            font-weight: bold;
            color: #075e54;
            margin-bottom: 3px;
        }
        .message .time {
            font-size: 0.7em;
            color: #888;
            text-align: left;
            margin-top: 3px;
        }
        .message.deleted {
            background: #f1f1f1;
            color: #999;
            font-style: italic;
        }
        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            justify-content: flex-end;
        }
        .message-actions button {
            border: none;
            background: transparent;
            color: #075e54;
            cursor: pointer;
            font-size: 0.8em;
        }
        .input-area {
            padding: 15px;
            background: #f0f2f5;
            display: flex;
            gap: 10px;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }
        .input-area button {
            background: #075e54;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .input-area button.secondary {
            background: #128C7E;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .modal-content .buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- الشريط الجانبي -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>المحادثات</h3>
                <div>
                    <span>المستخدم: </span>
                    <select id="user-select">
                        <option value="123456">أحمد (123456)</option>
                        <option value="789012">محمد (789012)</option>
                        <option value="345678">علي (345678)</option>
                    </select>
                </div>
            </div>
            <div class="conversations-list" id="conversations-list">
                <!-- سيتم تعبئتها بواسطة JS -->
            </div>
            <div style="padding: 10px;">
                <button id="create-group-btn" class="secondary" style="width:100%;">+ مجموعة جديدة</button>
            </div>
        </div>

        <!-- منطقة المحادثة الرئيسية -->
        <div class="main">
            <div class="chat-header" id="chat-header">
                <div class="avatar" id="chat-avatar">?</div>
                <div class="info">
                    <h3 id="chat-name">اختر محادثة</h3>
                    <p id="chat-status"></p>
                </div>
            </div>
            <div class="messages-area" id="messages-area">
                <!-- سيتم تعبئتها بواسطة JS -->
            </div>
            <div class="input-area" id="input-area" style="display: none;">
                <input type="text" id="message-input" placeholder="اكتب رسالة...">
                <button id="send-btn">إرسال</button>
            </div>
        </div>
    </div>

    <!-- Modal إنشاء مجموعة -->
    <div id="group-modal" class="modal hidden">
        <div class="modal-content">
            <h3>إنشاء مجموعة جديدة</h3>
            <input type="text" id="group-name" placeholder="اسم المجموعة">
            <input type="text" id="group-desc" placeholder="الوصف (اختياري)">
            <select id="group-members" multiple size="5">
                <!-- سيتم تعبئتها بقائمة المستخدمين -->
            </select>
            <p>اضغط Ctrl لتحديد عدة أعضاء</p>
            <div class="buttons">
                <button id="create-group-confirm">إنشاء</button>
                <button id="create-group-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- تعريف المتغيرات العامة وإصلاح الأخطاء ----------
        // عناصر DOM (نضيف تعريف chatStatus)
        const userSelect = document.getElementById('user-select');
        const conversationsList = document.getElementById('conversations-list');
        const chatName = document.getElementById('chat-name');
        const chatAvatar = document.getElementById('chat-avatar');
        const chatStatus = document.getElementById('chat-status'); // تم إضافته
        const messagesArea = document.getElementById('messages-area');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const createGroupBtn = document.getElementById('create-group-btn');
        const groupModal = document.getElementById('group-modal');
        const groupNameInput = document.getElementById('group-name');
        const groupDescInput = document.getElementById('group-desc');
        const groupMembersSelect = document.getElementById('group-members');
        const createGroupConfirm = document.getElementById('create-group-confirm');
        const createGroupCancel = document.getElementById('create-group-cancel');

        // ---------- Mock Data ----------
        const users = [
            { id: 123456, name: 'أحمد', phone: '+201111111111', profilePic: 'A' },
            { id: 789012, name: 'محمد', phone: '+201222222222', profilePic: 'M' },
            { id: 345678, name: 'علي', phone: '+201333333333', profilePic: 'C' }
        ];

        const contacts = {
            123456: [
                { userId: 789012, customName: 'محمد (صديق)' },
                { userId: 345678, customName: 'علي (الأخ)' }
            ],
            789012: [
                { userId: 123456, customName: 'أحمد' },
                { userId: 345678, customName: 'علي' }
            ],
            345678: [
                { userId: 123456, customName: 'أحمد' },
                { userId: 789012, customName: 'محمد' }
            ]
        };

        let userConversations = {
            123456: [
                { chatId: 1001, conversationType: 'individual', peerId: 789012, lastMessage: { content: { text: 'آخر رسالة من محمد' }, senderId: 789012, timestamp: Date.now() - 3600000, isMedia: false }, unreadCount: 2, updatedAt: Date.now() - 3600000 },
                { chatId: 1002, conversationType: 'individual', peerId: 345678, lastMessage: { content: { text: 'مرحبا علي' }, senderId: 123456, timestamp: Date.now() - 7200000, isMedia: false }, unreadCount: 0, updatedAt: Date.now() - 7200000 },
                { chatId: 2001, conversationType: 'group', peerId: 2001, lastMessage: { content: { text: 'رسالة في المجموعة' }, senderId: 789012, timestamp: Date.now() - 1800000, isMedia: false }, unreadCount: 1, updatedAt: Date.now() - 1800000, groupName: 'العائلة', groupPic: 'G' }
            ],
            789012: [
                { chatId: 1001, conversationType: 'individual', peerId: 123456, lastMessage: { content: { text: 'آخر رسالة من أحمد' }, senderId: 123456, timestamp: Date.now() - 3600000, isMedia: false }, unreadCount: 0, updatedAt: Date.now() - 3600000 },
                { chatId: 1003, conversationType: 'individual', peerId: 345678, lastMessage: { content: { text: 'كيف الحال؟' }, senderId: 789012, timestamp: Date.now() - 86400000, isMedia: false }, unreadCount: 0, updatedAt: Date.now() - 86400000 },
                { chatId: 2001, conversationType: 'group', peerId: 2001, lastMessage: { content: { text: 'رسالة في المجموعة' }, senderId: 789012, timestamp: Date.now() - 1800000, isMedia: false }, unreadCount: 0, updatedAt: Date.now() - 1800000, groupName: 'العائلة', groupPic: 'G' }
            ],
            345678: [
                { chatId: 1002, conversationType: 'individual', peerId: 123456, lastMessage: { content: { text: 'مرحبا علي' }, senderId: 123456, timestamp: Date.now() - 7200000, isMedia: false }, unreadCount: 1, updatedAt: Date.now() - 7200000 },
                { chatId: 1003, conversationType: 'individual', peerId: 789012, lastMessage: { content: { text: 'كيف الحال؟' }, senderId: 789012, timestamp: Date.now() - 86400000, isMedia: false }, unreadCount: 0, updatedAt: Date.now() - 86400000 }
            ]
        };

        let messages = {
            1001: [
                { id: 'm1', chatId: 1001, senderId: 123456, content: { text: 'السلام عليكم' }, timestamp: Date.now() - 86400000, deleted: false },
                { id: 'm2', chatId: 1001, senderId: 789012, content: { text: 'وعليكم السلام' }, timestamp: Date.now() - 86300000, deleted: false },
                { id: 'm3', chatId: 1001, senderId: 123456, content: { text: 'كيف حالك؟' }, timestamp: Date.now() - 3600000, deleted: false },
                { id: 'm4', chatId: 1001, senderId: 789012, content: { text: 'بخير الحمدلله' }, timestamp: Date.now() - 3500000, deleted: false }
            ],
            1002: [
                { id: 'm5', chatId: 1002, senderId: 123456, content: { text: 'مرحبا علي' }, timestamp: Date.now() - 7200000, deleted: false },
                { id: 'm6', chatId: 1002, senderId: 345678, content: { text: 'أهلاً أحمد' }, timestamp: Date.now() - 7100000, deleted: false }
            ],
            1003: [
                { id: 'm7', chatId: 1003, senderId: 789012, content: { text: 'كيف الحال؟' }, timestamp: Date.now() - 86400000, deleted: false },
                { id: 'm8', chatId: 1003, senderId: 345678, content: { text: 'الحمدلله' }, timestamp: Date.now() - 86000000, deleted: false }
            ],
            2001: [
                { id: 'm9', chatId: 2001, senderId: 789012, content: { text: 'أهلاً بالجميع' }, timestamp: Date.now() - 1800000, deleted: false },
                { id: 'm10', chatId: 2001, senderId: 123456, content: { text: 'نورت المجموعة' }, timestamp: Date.now() - 1700000, deleted: false }
            ]
        };

        let groups = {
            2001: { id: 2001, name: 'العائلة', profilePic: 'G', members: [123456, 789012, 345678], admins: [123456] }
        };

        let currentUserId = 123456;
        let currentChatId = null;

        // دوال مساعدة
        function getContactName(viewerId, targetId) {
            const viewerContacts = contacts[viewerId] || [];
            const contact = viewerContacts.find(c => c.userId === targetId);
            if (contact && contact.customName) return contact.customName;
            const user = users.find(u => u.id === targetId);
            return user ? user.name : 'غير معروف';
        }

        function getProfilePic(viewerId, targetId) {
            const name = getContactName(viewerId, targetId);
            return name.charAt(0);
        }

        // عرض قائمة المحادثات (مع التحقق من وجود lastMessage)
        function renderConversations() {
            const convs = userConversations[currentUserId] || [];
            convs.sort((a, b) => b.updatedAt - a.updatedAt);
            let html = '';
            convs.forEach(conv => {
                let displayName = '';
                let avatar = '';
                if (conv.conversationType === 'individual') {
                    displayName = getContactName(currentUserId, conv.peerId);
                    avatar = getProfilePic(currentUserId, conv.peerId);
                } else {
                    const group = groups[conv.peerId] || { name: conv.groupName || 'مجموعة' };
                    displayName = group.name;
                    avatar = conv.groupPic || 'G';
                }
                // التحقق من وجود lastMessage قبل استخدامه (إصلاح الخطأ)
                let lastMsgText = 'لا توجد رسائل';
                let senderPrefix = '';
                if (conv.lastMessage) {
                    lastMsgText = conv.lastMessage.content?.text || (conv.lastMessage.isMedia ? 'وسائط' : '');
                    senderPrefix = conv.lastMessage.senderId === currentUserId ? 'أنت: ' : '';
                }
                const isActive = (conv.chatId === currentChatId) ? 'active' : '';
                html += `
                    <div class="conversation-item ${isActive}" data-chatid="${conv.chatId}">
                        <div class="conversation-avatar">${avatar}</div>
                        <div class="conversation-info">
                            <div class="conversation-name">
                                <span>${displayName}</span>
                                ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
                            </div>
                            <div class="conversation-last-message">
                                ${senderPrefix}${lastMsgText}
                            </div>
                        </div>
                    </div>
                `;
            });
            conversationsList.innerHTML = html;

            document.querySelectorAll('.conversation-item').forEach(item => {
                item.addEventListener('click', () => {
                    const chatId = Number(item.dataset.chatid);
                    openConversation(chatId);
                });
            });
        }

        function openConversation(chatId) {
            currentChatId = chatId;
            document.querySelectorAll('.conversation-item').forEach(i => i.classList.remove('active'));
            const activeItem = document.querySelector(`.conversation-item[data-chatid="${chatId}"]`);
            if (activeItem) activeItem.classList.add('active');

            const convs = userConversations[currentUserId] || [];
            const conv = convs.find(c => c.chatId === chatId);
            if (!conv) return;

            let displayName = '';
            let avatar = '';
            if (conv.conversationType === 'individual') {
                displayName = getContactName(currentUserId, conv.peerId);
                avatar = getProfilePic(currentUserId, conv.peerId);
            } else {
                const group = groups[conv.peerId] || { name: conv.groupName || 'مجموعة' };
                displayName = group.name;
                avatar = conv.groupPic || 'G';
            }
            chatName.textContent = displayName;
            chatAvatar.textContent = avatar;
            chatStatus.textContent = conv.conversationType === 'group' ? 'مجموعة' : '';

            inputArea.style.display = 'flex';

            if (conv.unreadCount > 0) {
                conv.unreadCount = 0;
                // ** يمكن استدعاء PUT /api/conversations/{chatId}/settings لتحديث unread **
                renderConversations();
            }

            loadMessages(chatId);
        }

        function loadMessages(chatId) {
            const msgs = messages[chatId] || [];
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            let html = '';
            msgs.forEach(msg => {
                const isSent = msg.senderId === currentUserId;
                const senderName = isSent ? 'أنت' : getContactName(currentUserId, msg.senderId);
                const time = new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                let messageContent = '';
                if (msg.deleted) {
                    messageContent = 'تم حذف هذه الرسالة';
                } else {
                    messageContent = msg.content?.text || (msg.content?.mediaUrl ? 'وسائط' : '');
                }
                html += `
                    <div class="message ${isSent ? 'sent' : 'received'} ${msg.deleted ? 'deleted' : ''}">
                        ${!isSent ? `<div class="sender-name">${senderName}</div>` : ''}
                        <div>${messageContent}</div>
                        <div class="time">${time}</div>
                        ${!msg.deleted && isSent ? `
                            <div class="message-actions">
                                <button class="delete-for-me" data-msgid="${msg.id}">حذف لنفسي</button>
                                <button class="delete-for-everyone" data-msgid="${msg.id}">حذف للجميع</button>
                            </div>
                        ` : ''}
                        ${!msg.deleted && !isSent ? `
                            <div class="message-actions">
                                <button class="delete-for-me" data-msgid="${msg.id}">حذف لنفسي</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            messagesArea.innerHTML = html;

            document.querySelectorAll('.delete-for-me').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const msgId = e.target.dataset.msgid;
                    deleteMessage(msgId, 'me');
                });
            });
            document.querySelectorAll('.delete-for-everyone').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const msgId = e.target.dataset.msgid;
                    deleteMessage(msgId, 'everyone');
                });
            });

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function deleteMessage(messageId, deleteFor) {
            let msg = null;
            let chatId = null;
            for (const [cid, msgs] of Object.entries(messages)) {
                const found = msgs.find(m => m.id === messageId);
                if (found) {
                    msg = found;
                    chatId = Number(cid);
                    break;
                }
            }
            if (!msg) return;

            if (deleteFor === 'me') {
                if (!msg.deletedFor) msg.deletedFor = [];
                if (!msg.deletedFor.includes(currentUserId)) {
                    msg.deletedFor.push(currentUserId);
                }
                // ** يمكن استدعاء DELETE /api/messages/{messageId}?deleteFor=me **
                loadMessages(chatId);
            } else {
                const conversation = userConversations[currentUserId].find(c => c.chatId === chatId);
                const isGroup = conversation && conversation.conversationType === 'group';
                const isAdmin = isGroup && groups[conversation.peerId]?.admins.includes(currentUserId);
                if (msg.senderId !== currentUserId && !isAdmin) {
                    alert('لا يمكنك حذف هذه الرسالة للجميع');
                    return;
                }
                msg.deleted = true;
                // ** يمكن استدعاء DELETE /api/messages/{messageId}?deleteFor=everyone **
                loadMessages(chatId);
                updateLastMessageAfterDeletion(chatId);
            }
        }

        function updateLastMessageAfterDeletion(chatId) {
            const convs = userConversations[currentUserId];
            const convIndex = convs.findIndex(c => c.chatId === chatId);
            if (convIndex === -1) return;
            const conv = convs[convIndex];
            const msgs = messages[chatId] || [];
            const lastNonDeleted = msgs.filter(m => !m.deleted).sort((a,b) => b.timestamp - a.timestamp)[0];
            if (lastNonDeleted) {
                conv.lastMessage = {
                    content: { text: lastNonDeleted.content.text },
                    senderId: lastNonDeleted.senderId,
                    timestamp: lastNonDeleted.timestamp,
                    isMedia: false
                };
            } else {
                conv.lastMessage = null;
            }
            conv.updatedAt = Date.now();
            renderConversations();
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChatId) return;

            const tempId = 'temp_' + Date.now();
            const newMsg = {
                id: tempId,
                chatId: currentChatId,
                senderId: currentUserId,
                content: { text: text },
                timestamp: Date.now(),
                deleted: false
            };

            if (!messages[currentChatId]) messages[currentChatId] = [];
            messages[currentChatId].push(newMsg);
            loadMessages(currentChatId);
            messageInput.value = '';

            const convs = userConversations[currentUserId];
            const conv = convs.find(c => c.chatId === currentChatId);
            if (conv) {
                conv.lastMessage = {
                    content: { text: text },
                    senderId: currentUserId,
                    timestamp: Date.now(),
                    isMedia: false
                };
                conv.updatedAt = Date.now();
                renderConversations();
            }

            // ** هنا يمكن استدعاء POST /api/messages مع chatId أو recipientId **
        }

        function createGroup() {
            const name = groupNameInput.value.trim();
            if (!name) return;
            const selectedOptions = Array.from(groupMembersSelect.selectedOptions).map(opt => Number(opt.value));
            if (selectedOptions.length === 0) return;

            const newGroupId = Date.now();
            groups[newGroupId] = {
                id: newGroupId,
                name: name,
                profilePic: 'G',
                members: [currentUserId, ...selectedOptions],
                admins: [currentUserId]
            };

            const members = [currentUserId, ...selectedOptions];
            members.forEach(memberId => {
                if (!userConversations[memberId]) userConversations[memberId] = [];
                userConversations[memberId].push({
                    chatId: newGroupId,
                    conversationType: 'group',
                    peerId: newGroupId,
                    lastMessage: null,
                    unreadCount: 0,
                    updatedAt: Date.now(),
                    groupName: name,
                    groupPic: 'G'
                });
            });

            messages[newGroupId] = [];
            groupModal.classList.add('hidden');
            renderConversations();

            // ** هنا يمكن استدعاء POST /api/groups **
        }

        function switchUser(userId) {
            currentUserId = userId;
            currentChatId = null;
            inputArea.style.display = 'none';
            chatName.textContent = 'اختر محادثة';
            chatAvatar.textContent = '?';
            chatStatus.textContent = '';
            messagesArea.innerHTML = '';
            renderConversations();
        }

        // أحداث
        userSelect.addEventListener('change', (e) => {
            switchUser(Number(e.target.value));
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        createGroupBtn.addEventListener('click', () => {
            const options = users.filter(u => u.id !== currentUserId).map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            groupMembersSelect.innerHTML = options;
            groupNameInput.value = '';
            groupDescInput.value = '';
            groupModal.classList.remove('hidden');
        });

        createGroupConfirm.addEventListener('click', createGroup);
        createGroupCancel.addEventListener('click', () => {
            groupModal.classList.add('hidden');
        });

        // بدء التشغيل
        switchUser(currentUserId);
    </script>
</body>
</html>
